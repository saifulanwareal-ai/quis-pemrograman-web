<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Sederhana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #0077ff;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Website Saya</h1>
    <p>Belajar HTML itu mudah 🚀</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Tentang</a>
    <a href="#">Kontak</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Selamat Datang</h2>
        <p>Ini adalah website sederhana pertama saya.</p>
    </div>

    <div class="card">
        <h2>Tentang Saya</h2>
        <p>Saya sedang belajar membuat website menggunakan HTML dan CSS.</p>
    </div>

    <div class="card">
        <h2>Kontak</h2>
        <p>Email: contoh@email.com</p>
    </div>
</div>

<footer>
    <p>© 2026 Website Saya</p>
</footer>

</body>
</html>
